name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  GO_VERSION: "1.25.7"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/tools/cmd/deadcode@latest
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.54.2
          go install github.com/cucumber/godog/cmd/godog@latest

      - name: Run checks
        run: make check

      - name: Run BDD smoke tests
        run: make bdd-smoke

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: flowstate-linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: flowstate-darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: flowstate-darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: flowstate-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=$(git describe --tags --always)
          go build -ldflags "-s -w -X main.Version=${VERSION}" \
            -o ${{ matrix.suffix }} ./cmd/flowstate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: ${{ matrix.suffix }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -name "flowstate-*" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
          GIT_COMMITTER_NAME: "github-actions[bot]"
          GIT_COMMITTER_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: npx semantic-release

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [ci, build, release]
    if: failure()
    steps:
      - uses: actions/checkout@v4

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Release pipeline failed: ${context.sha.substring(0, 7)}`;
            const body = `## Release Pipeline Failure

            **Workflow:** ${context.workflow}
            **Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}
            **Commit:** ${context.sha}
            **Branch:** ${context.ref}

            Please investigate and fix the failing job.
            `;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'ci-failure'],
            });
