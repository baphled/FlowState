name: CI
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Download dependencies
        run: go mod download
      - name: Build
        run: make build
      - name: Test
        run: make test
      - name: Lint
        run: make lint
      - name: BDD smoke
        run: make bdd-smoke
