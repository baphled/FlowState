schema_version: "1.0.0"
id: a-team
description: >
  A versatile generalist swarm for tasks that don't fit a fixed workflow.
  The coordinator reads the task, decides which agents to engage (not every
  task needs every agent), and routes dynamically. The critic plays a
  mandatory adversarial role on any non-trivial run. The post-member
  relevance gate enforces topic-fit on the researcher's output before any
  downstream member runs — off-topic research is rejected with a redirect
  signal so the coordinator can re-scope rather than letting drift cascade
  through strategy and writing.

# `coordinator` is the registered lead agent (internal/app/agents/coordinator.md).
# Members resolve via the agent registry's case-insensitive name+alias lookup,
# so `researcher` and `writer` route to the existing Researcher and Writer
# manifests (whose aliases include the lowercase ids).
lead: coordinator

# a-team no longer auto-dispatches on @coordinator invocation. As of
# Phase 3 of the Meta-Swarm Coordinator Architecture rewiring,
# coordinator is the lead of meta-swarm (`internal/app/swarms/meta-swarm.yml`)
# and meta-swarm is the sole auto-dispatch candidate for @coordinator.
# `@a-team` invocations still resolve to this swarm explicitly via the
# swarm registry; only auto-dispatch via the lead name is opted out.
#
# Were both swarms to keep auto_dispatch_on_lead=true with the same
# lead, Registry.AutoDispatchSwarmFor would return (nil, false) as a
# collision (see a833fd3a) and @coordinator would silently no-op into
# KindAgent. Flipping a-team's flag false leaves meta-swarm as the
# unambiguous auto-dispatch target.
auto_dispatch_on_lead: false

members:
  - researcher
  - strategist
  - critic
  - writer
  - executor

harness:
  # Sequential — the A-Team pipeline is dependency-driven (research →
  # strategy → critique → writing → optional execution) and parallelism
  # would race the coordination_store.
  parallel: false

  # Post-member relevance gate around the researcher. The gate's
  # ext-manifest declares two coord-store inputs (task_plan + research)
  # which the host composes into a multi-key JSON payload before
  # invoking the gate executable — see internal/gates/relevance-gate/
  # manifest.yml. Naming convention follows planning-loop.yml's
  # `post-member-<member>-<concern>` shape so log readers can scan the
  # swarm catalogue uniformly.
  gates:
    - name: post-member-researcher-relevance
      kind: ext:relevance-gate
      when: post-member
      target: researcher
      output_key: output

context:
  # Coordination_store namespace for this swarm's runs. Pinned so the
  # coordinator's documented chain keys (`a-team/{chainID}/task-plan`,
  # `a-team/{chainID}/strategy`, etc.) are stable across reboots.
  chain_prefix: a-team
