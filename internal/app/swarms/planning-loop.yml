schema_version: "1.0.0"
id: planning-loop
description: >
  Reproduces today's deterministic planning loop: planner orchestrates
  explorer + librarian + analyst + plan-writer + plan-reviewer through
  the coordination_store. Lead is `planner`. Each member that writes
  structured output to the coord-store has a post-member gate
  validating that output against a registered JSON schema before the
  next member runs — malformed payloads halt the swarm with a
  GateError instead of cascading into downstream confusion.

# `planner` is a registered agent today (internal/app/agents/planner.md).
# It already orchestrates the five members listed below via its
# delegation.allowlist. The swarm runner inherits that wiring without
# changing the planner's prompt.
lead: planner

# Explicit roster — agent ids only at this stage. Sub-swarm composition
# (a member that resolves to another swarm) is supported per §4 of the
# spec; introduce later when a sub-swarm artifact actually exists.
members:
  - explorer
  - librarian
  - analyst
  - plan-writer
  - plan-reviewer

harness:
  # Sequential by default — the planner's loop is dependency-driven
  # (interview → research → analysis → write → review) and parallelism
  # at this layer would race the coordination_store. §T37 will offer
  # `parallel: true` for swarms whose member set is genuinely
  # independent.
  parallel: false

  # Swarm-level post-member gates, one per member that writes
  # structured output to the coord-store. Each gate names the
  # corresponding JSON schema registered in
  # internal/swarm/schemas.go::SeedDefaultSchemas. `kind:
  # builtin:result-schema` resolves in-process; no Extension API v1
  # backend required.
  gates:
    - name: post-member-explorer-evidence-bundle
      kind: builtin:result-schema
      schema_ref: evidence-bundle-v1
      when: post-member
      target: explorer
      output_key: output
    - name: post-member-librarian-external-refs
      kind: builtin:result-schema
      schema_ref: external-refs-v1
      when: post-member
      target: librarian
      output_key: output
    - name: post-member-analyst-analysis-bundle
      kind: builtin:result-schema
      schema_ref: analysis-bundle-v1
      when: post-member
      target: analyst
      output_key: output
    - name: post-member-plan-writer-plan-document
      kind: builtin:result-schema
      schema_ref: plan-document-v1
      when: post-member
      target: plan-writer
      output_key: output
    - name: post-member-plan-reviewer-result-schema
      kind: builtin:result-schema
      schema_ref: review-verdict-v1
      when: post-member
      target: plan-reviewer
      output_key: review

context:
  # Coordination_store namespace for this swarm's runs. Defaults to the
  # swarm id when omitted; pinning explicitly so the documented chain
  # keys (e.g. `planning/<chain-id>/requirements`) are stable.
  chain_prefix: planning
