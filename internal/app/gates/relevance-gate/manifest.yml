name: relevance-gate
description: >
  Validates that the researcher's output is substantively on-topic for the
  original task. Compares keywords from the task-plan against the research
  content using word overlap scoring. Rejects research that scores below
  0.4 (40% keyword overlap) and provides a redirect signal embedded in the
  reason string.
version: "0.1.0"
exec: ./gate.py
timeout: 10s
policy:
  threshold: 0.4
# Multi-key inputs declaration — host composes a JSON object
# {"task_plan": <bytes>, "research": <bytes>} from the coord-store before
# invoking the gate. The "${target}" placeholder for `research` resolves
# to the dispatching gate's Target (the researcher) at composition time
# so the manifest stays member-agnostic. Without this declaration the
# gate would receive a single-key payload (the researcher's output bytes
# only) and have nothing to score against — see commit `0cb50144` for
# the host-side composition path.
inputs:
  - name: task_plan
    member: coordinator
    output_key: task-plan
  - name: research
    member: ${target}
    output_key: output
