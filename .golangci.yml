version: "2"

linters:
  default: none
  enable:
    - unused
    - unparam
    - staticcheck
    - govet
  settings:
    staticcheck:
      checks:
        - "all"
        - "-SA1019"
        - "-ST1000"
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - unused
          - unparam
